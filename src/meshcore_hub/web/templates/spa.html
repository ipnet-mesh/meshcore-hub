<!DOCTYPE html>
<html lang="en" data-theme="{{ default_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ network_name }}</title>

    <!-- Theme initialization (before CSS to prevent flash) -->
    <script>
        (function() {
            var theme = localStorage.getItem('meshcore-theme');
            if (theme) document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{{ network_name }}{% if network_welcome_text %} - {{ network_welcome_text }}{% else %} - MeshCore off-grid LoRa mesh network dashboard.{% endif %}">
    <meta name="generator" content="MeshCore Hub {{ version }}">
    <link rel="canonical" href="{{ request.url }}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ network_name }}">
    <meta property="og:description" content="{{ network_name }}{% if network_welcome_text %} - {{ network_welcome_text }}{% else %} - MeshCore off-grid LoRa mesh network dashboard.{% endif %}">
    <meta property="og:site_name" content="{{ network_name }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ network_name }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ logo_url }}">
    {% if not logo_invert_light %}
    <style>
        /* Keep custom network logos full-color in light mode */
        [data-theme="light"] img[src="{{ logo_url }}"] { filter: none !important; }
    </style>
    {% endif %}

    <!-- Preload primary UI font (URL must match the @font-face src exactly; crossorigin required for fonts) -->
    <link rel="preload" href="/static/vendor/fonts/ibm-plex-sans-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Tailwind CSS with DaisyUI (built from source) -->
    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ version }}" />

    <!-- Vite-bundled CSS (React components + Leaflet). Loaded before app.css
         so app.css theme overrides (e.g. dark-mode map popups) still win. -->
    {% if asset_app_css %}
    <link rel="stylesheet" href="/static/dist/{{ asset_app_css }}">
    {% endif %}

    <!-- Custom application styles -->
    <link rel="stylesheet" href="/static/css/app.css?v={{ version }}">
</head>
<body class="min-h-screen bg-base-200 flex flex-col">
    <!-- React shell: navbar, announcements, routed page content, and footer render here -->
    <div id="app" class="flex-1 flex flex-col"></div>

    <!-- Embedded app configuration -->
    <script>
        window.__APP_CONFIG__ = {{ config_json|safe }};
    </script>

    <!-- SPA Application (ES Module, built by Vite) -->
    {% if asset_app_js %}
    <script type="module" src="/static/dist/{{ asset_app_js }}"></script>
    {% endif %}
</body>
</html>
